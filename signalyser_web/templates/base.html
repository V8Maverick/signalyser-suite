<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>{% block title %}Signalyser Suite{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <a href="#main" class="sr-only">Skip to content</a>
  <header class="topbar">
    <div class="brand">Signalyser <span>Suite</span></div>
    <nav aria-label="Primary">
      <a href="/tools" class="{{ 'on' if active == 'tools' }}" {{ 'aria-current=page' if active == 'tools' }}>Tools</a>
      <a href="/corpus" class="{{ 'on' if active == 'corpus' }}" {{ 'aria-current=page' if active == 'corpus' }}>Corpus</a>
      <a href="/reports" class="{{ 'on' if active == 'reports' }}" {{ 'aria-current=page' if active == 'reports' }}>Reports</a>
      <a href="/sessions" class="{{ 'on' if active == 'sessions' }}" {{ 'aria-current=page' if active == 'sessions' }}>Sessions</a>
      <a href="/settings" class="{{ 'on' if active == 'settings' }}" {{ 'aria-current=page' if active == 'settings' }}>Settings</a>
    </nav>
    {% if session %}
    <a href="/sessions" class="session-chip" title="Active session — click to manage">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>{{ session }}</span>
    </a>
    {% endif %}
  </header>
  <main id="main" class="content">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
