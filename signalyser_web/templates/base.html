<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>{% block title %}Signalyser Suite{% endblock %}</title>
  {% set ui = ui|default('v2') %}
  <link rel="stylesheet" href="/static/app.css">
  {% if ui == 'v2' %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app_v2.css">
  {% endif %}
</head>
<body class="ui-{{ ui }}">
  <a href="#main" class="sr-only">Skip to content</a>
  <header class="topbar">
    <div class="brand">Signalyser <span>Suite</span></div>
    <nav aria-label="Primary">
      <a href="/tools" class="{{ 'on' if active == 'tools' }}" {{ 'aria-current=page' if active == 'tools' }}>Tools</a>
      <a href="/corpus" class="{{ 'on' if active == 'corpus' }}" {{ 'aria-current=page' if active == 'corpus' }}>Corpus</a>
      <a href="/reports" class="{{ 'on' if active == 'reports' }}" {{ 'aria-current=page' if active == 'reports' }}>Reports</a>
      <a href="/sessions" class="{{ 'on' if active == 'sessions' }}" {{ 'aria-current=page' if active == 'sessions' }}>Sessions</a>
      <a href="/settings" class="{{ 'on' if active == 'settings' }}" {{ 'aria-current=page' if active == 'settings' }}>Settings</a>
    </nav>
    <div class="topbar-right">
      {% if session %}
      <a href="/sessions" class="session-chip" title="Active session — click to manage">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>{{ session }}</span>
      </a>
      {% endif %}
      <span class="ui-toggle" role="group" aria-label="Interface version">
        <a href="/ui/v1" class="{{ 'on' if ui == 'v1' }}">v1</a>
        <a href="/ui/v2" class="{{ 'on' if ui == 'v2' }}">v2</a>
      </span>
    </div>
  </header>
  <main id="main" class="content">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
  {% if ui == 'v2' %}<script src="/static/app_v2.js"></script>{% endif %}
</body>
</html>
